<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UtilPage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="dashboard" class="dashboard" aria-label="UtilPage dashboard">
      <div id="gridLayer" class="grid-layer">
        <section id="cardLayer" class="card-layer" aria-label="Cards"></section>
      </div>
    </main>
    <div class="zoom-controls" aria-label="Zoom controls">
      <button id="miniMapToggleButton" class="zoom-button" type="button" aria-label="Hide mini map"></button>
      <button id="gridToggleButton" class="zoom-button" type="button" aria-label="Hide grid lines"></button>
      <button id="zoomOutButton" class="zoom-button" type="button" aria-label="Zoom out">-</button>
      <button id="zoomInButton" class="zoom-button" type="button" aria-label="Zoom in">+</button>
    </div>
    <aside id="miniMap" class="mini-map" aria-label="Mini map">
      <div id="miniMapSurface" class="mini-map__surface"></div>
    </aside>
    <div id="dashboardToast" class="dashboard-toast is-hidden" role="status" aria-live="polite"></div>
    <nav id="cardContextMenu" class="card-context-menu is-hidden" aria-label="Card actions"></nav>

    <button id="mobileUtilButton" class="mobile-util-button" type="button" aria-label="Open utility controls" aria-expanded="false">...</button>
    <button id="mobileAddCardButton" class="mobile-add-button" type="button" aria-label="Add card">+</button>

    <aside id="utilModal" class="util-modal" aria-label="Utility controls">
      <header class="util-modal__header">
        <div>
          <h1>UtilPage</h1>
          <p id="cardCount">0 cards</p>
        </div>
        <button id="addCardButton" class="button button--primary" type="button">Add card</button>
      </header>

      <section class="search-section" aria-label="Search cards">
        <label class="search-field">
          <input id="cardSearchInput" type="text" autocomplete="off" placeholder="Search cards" />
          <button id="clearSearchButton" class="search-field__clear" type="button" aria-label="Clear search">x</button>
        </label>
      </section>

      <section class="card-list-section" aria-label="Card list">
        <h2>Cards</h2>
        <div id="cardList" class="card-list"></div>
      </section>

      <footer class="util-modal__footer">
        <button id="exportButton" class="button" type="button">Export</button>
        <button id="importButton" class="button" type="button">Import</button>
      </footer>
    </aside>

    <aside id="cardConfigModal" class="config-modal is-hidden" aria-label="Card configuration">
      <header class="config-modal__header">
        <div>
          <h2>Card config</h2>
          <p id="configCardMeta">No card selected</p>
        </div>
        <button id="closeConfigButton" class="icon-button" type="button" aria-label="Close card configuration">
          x
        </button>
      </header>

      <section class="editor" aria-label="Selected card editor">
        <label>
          Type
          <select id="typeInput"></select>
        </label>
        <label>
          Color theme
          <select id="colorThemeInput">
            <option value="slate">■ Slate</option>
            <option value="zinc">■ Zinc</option>
            <option value="red">■ Red</option>
            <option value="orange">■ Orange</option>
            <option value="amber">■ Amber</option>
            <option value="yellow">■ Yellow</option>
            <option value="lime">■ Lime</option>
            <option value="green">■ Green</option>
            <option value="teal">■ Teal</option>
            <option value="cyan">■ Cyan</option>
            <option value="sky">■ Sky</option>
            <option value="blue">■ Blue</option>
            <option value="indigo">■ Indigo</option>
            <option value="violet">■ Violet</option>
            <option value="fuchsia">■ Fuchsia</option>
            <option value="rose">■ Rose</option>
          </select>
        </label>
        <label>
          Title
          <input id="titleInput" type="text" autocomplete="off" />
        </label>
        <label>
          Content
          <textarea id="contentInput" rows="4"></textarea>
        </label>
        <label>
          URL
          <input id="urlInput" type="url" autocomplete="url" />
        </label>
        <label>
          Local path
          <input id="localPathInput" type="text" autocomplete="off" />
        </label>
        <label>
          Local link mode
          <select id="localLinkModeInput">
            <option value="app">App</option>
            <option value="text">Text</option>
          </select>
        </label>
        <label>
          Image URL (Online)
          <input id="imagePathInput" type="text" autocomplete="off" />
        </label>
        <label>
          Secret
          <input id="secretInput" type="text" autocomplete="off" />
        </label>
        <div class="editor__grid">
          <label>
            Width
            <input id="widthInput" type="number" min="8" step="1" />
          </label>
          <label>
            Height
            <input id="heightInput" type="number" min="6" step="1" />
          </label>
        </div>
        <div class="editor__actions">
          <button id="cancelConfigButton" class="button" type="button">Cancel</button>
          <button id="saveConfigButton" class="button button--primary" type="button">Add</button>
        </div>
      </section>
    </aside>

    <aside id="importModal" class="config-modal is-hidden" aria-label="Import content">
      <header class="config-modal__header">
        <div>
          <h2>Import content</h2>
          <p>Paste exported card or dashboard data</p>
        </div>
        <button id="closeImportButton" class="icon-button" type="button" aria-label="Close import content">
          x
        </button>
      </header>

      <section class="editor" aria-label="Import editor">
        <label>
          Content
          <textarea id="importContentInput" rows="8"></textarea>
        </label>
        <div class="editor__actions">
          <button id="cancelImportButton" class="button" type="button">Cancel</button>
          <button id="confirmImportButton" class="button button--primary" type="button">Import</button>
        </div>
      </section>
    </aside>

    <script src="js/constants.js"></script>
    <script src="js/cardSchema.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/state.js"></script>
    <script src="js/cardModel.js"></script>
    <script src="js/searchModel.js"></script>
    <script src="js/clipboard.js"></script>
    <script src="js/render.js"></script>
    <script src="js/interactions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
